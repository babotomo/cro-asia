<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRO ASIA Hero</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f3763;
    }

    .hero {
      position: relative;
      min-height: 720px;
      display: flex;
      align-items: center;
      overflow: hidden;

      background-image: url("asean-hero.png");
      background-size: cover;
      background-position: right center;
      background-repeat: no-repeat;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        rgba(255,255,255,0.97) 0%,
        rgba(255,255,255,0.92) 24%,
        rgba(255,255,255,0.72) 42%,
        rgba(255,255,255,0.28) 58%,
        rgba(255,255,255,0) 72%
      );
      z-index: 1;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      padding: 80px 40px;
    }

    .hero-content {
      max-width: 560px;
    }

    .hero-title {
      font-size: 64px;
      line-height: 1.08;
      font-weight: 700;
      letter-spacing: -1px;
      color: #1c3768;
      margin-bottom: 24px;
    }

    .hero-subtitle {
      font-size: 26px;
      line-height: 1.25;
      font-weight: 600;
      color: #1c3768;
      margin-bottom: 42px;
    }

    .hero-stats {
      display: flex;
      gap: 24px;
      align-items: stretch;
      width: fit-content;
      background: rgba(255,255,255,0.95);
      border-radius: 18px;
      padding: 26px 30px;
      box-shadow: 0 18px 40px rgba(24,47,94,0.10);
    }

    .stat {
      min-width: 220px;
    }

    .stat-number-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 8px;
    }

    .stat-icon {
      font-size: 34px;
      line-height: 1;
    }

    .stat-number {
      font-size: 56px;
      line-height: 1;
      font-weight: 700;
      color: #1c3768;
    }

    .stat-label {
      font-size: 20px;
      line-height: 1.3;
      color: #42557c;
    }

    @media (max-width: 1024px) {
      .hero {
        min-height: 640px;
        background-position: 68% center;
      }

      .hero-title {
        font-size: 52px;
      }

      .hero-subtitle {
        font-size: 22px;
      }

      .hero-stats {
        flex-direction: column;
        gap: 18px;
      }

      .stat {
        min-width: 0;
      }
    }

    @media (max-width: 768px) {
      .hero {
        min-height: auto;
        padding: 40px 0;
        background-position: 72% center;
      }

      .hero::before {
        background: linear-gradient(
          180deg,
          rgba(255,255,255,0.92) 0%,
          rgba(255,255,255,0.72) 42%,
          rgba(255,255,255,0.22) 68%,
          rgba(255,255,255,0) 100%
        );
      }

      .hero-inner {
        padding: 36px 20px;
      }

      .hero-content {
        max-width: 100%;
      }

      .hero-title {
        font-size: 40px;
        line-height: 1.12;
      }

      .hero-subtitle {
        font-size: 20px;
        margin-bottom: 28px;
      }

      .hero-stats {
        width: 100%;
        padding: 22px 20px;
        border-radius: 14px;
      }

      .stat-number {
        font-size: 42px;
      }

      .stat-label {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="hero-inner">
      <div class="hero-content">
        <h1 class="hero-title">
          ASEAN –<br>
          10 zemalja<br>
          i ogromne prilike
        </h1>

        <p class="hero-subtitle">
          Otvaramo vrata tržištima jugoistočne Azije uz lokalno iskustvo i poslovnu podršku.
        </p>

        <div class="hero-stats">
          <div class="stat">
            <div class="stat-number-wrap">
              <div class="stat-number">10</div>
            </div>
            <div class="stat-label">zemalja i ogromne prilike</div>
          </div>

          <div class="stat">
            <div class="stat-number-wrap">
              <div class="stat-icon">🤝</div>
              <div class="stat-number">30+</div>
            </div>
            <div class="stat-label">godina poslovnog iskustva</div>
          </div>
        </div>
      </div>
    </div>
  </section>

</body>
</html>
